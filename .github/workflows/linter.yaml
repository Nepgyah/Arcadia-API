name: Pylinter Action
on:
  pull_request:
    branches:
      - main

jobs:
  Pylinter:
    name: Run python linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setting up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint

      - name: Analysing Asobu App
        run: |
          pylint asobu

      - name: Analysing Miru App
        run: |
          pylint miru

      - name: Analysing Talent App
        run: |
          pylint talent