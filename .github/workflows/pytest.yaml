name: Pytest Actions
on:
  pull_request:
    branches:
      - main

jobs:
  Test-App-Miru:
    name: Runs unit testing on the Miru app using pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setting up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest miru/

